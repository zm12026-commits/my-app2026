<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Diary - 日々の記録</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- FontAwesome (アイコン用) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-book-open"></i> Simple Diary</h1>
            <p>日々の出来事を大切に記録しましょう</p>
        </header>

        <section class="editor-section">
            <form id="diary-form">
                <div class="form-group">
                    <label for="date-input">日付</label>
                    <input type="date" id="date-input" required>
                </div>
                <div class="form-group">
                    <label for="text-input">内容</label>
                    <textarea id="text-input" rows="5" placeholder="今日はどんな一日でしたか？" required></textarea>
                </div>
                <button type="submit" class="submit-btn">
                    <i class="fas fa-pen"></i> 記録する
                </button>
            </form>
        </section>

        <section class="entries-section">
            <div id="entries-container">
                <!-- JavaScriptで日記がここに追加されます -->
            </div>
        </section>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
