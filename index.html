<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ぷりぷりダイアリー</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="compact-mode">
    <div class="stars-container" id="stars-container"></div>
    
    <!-- BGM Control -->
    <div class="top-controls">
        <button id="bgm-toggle" class="circle-btn" aria-label="BGM">
            <i class="fas fa-music"></i>
        </button>
        <audio id="bgm-audio" loop>
            <source src="bgm.mp3" type="audio/mpeg">
        </audio>
    </div>
    
    <div class="main-screen">
        <header class="mini-header">
            <h1>
                <img src="image copy.png" alt="" class="micro-mascot floating">
                ぷりぷりダイアリー
            </h1>
        </header>

        <!-- グラフ (高さを抑える) -->
        <section class="mini-stats">
            <div class="canvas-wrapper">
                <canvas id="mood-chart"></canvas>
            </div>
        </section>

        <!-- エディタ (コンパクト化) -->
        <section class="mini-editor">
            <form id="diary-form">
                <div class="row">
                    <input type="date" id="date-input" required>
                    <div class="mini-mood-selector">
                        <input type="radio" name="mood" value="happy" id="mood-happy" checked><label for="mood-happy">😊</label>
                        <input type="radio" name="mood" value="good" id="mood-good"><label for="mood-good">🙂</label>
                        <input type="radio" name="mood" value="normal" id="mood-normal"><label for="mood-normal">😐</label>
                        <input type="radio" name="mood" value="sad" id="mood-sad"><label for="mood-sad">😟</label>
                        <input type="radio" name="mood" value="cry" id="mood-cry"><label for="mood-cry">😭</label>
                    </div>
                </div>

                <div class="input-wrapper">
                    <textarea id="text-input" rows="2" placeholder="きょうは どうだった？" required></textarea>
                </div>

                <button type="submit" class="submit-btn-mini">
                    <i class="fas fa-cloud"></i> まほうの ほぞん
                </button>
            </form>
        </section>

        <!-- 履歴エリア (最小限の表示) -->
        <section class="mini-history">
            <div id="entries-container"></div>
        </section>
    </div>

    <!-- 占いモーダル -->
    <div id="fortune-modal" class="modal">
        <div class="modal-content">
            <h3>✨ フォーチュン ✨</h3>
            <div id="fortune-result"></div>
            <button onclick="closeModal()" class="close-btn">OK! 💖</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
